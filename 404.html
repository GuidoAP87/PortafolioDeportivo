<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Página no encontrada — Nacho Lingua Fotografía</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
        body {
            background:#06060A; color:#f2f2f2;
            font-family:'Inter',sans-serif;
            display:flex; align-items:center; justify-content:center;
            min-height:100vh; padding:20px;
        }
        body::after {
            content:''; position:fixed; inset:0;
            background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
            opacity:0.022; pointer-events:none; z-index:0;
        }
        .card {
            max-width:480px; width:100%;
            background:#0c0c12; border:1px solid #1c1c24;
            padding:60px 44px; text-align:center;
            box-shadow:0 0 80px rgba(0,0,0,0.7);
            animation:fadeUp 0.7s ease; position:relative; z-index:1;
        }
        @keyframes fadeUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:none} }
        .brand { font-family:'Bebas Neue',sans-serif; font-size:14px; letter-spacing:5px; color:#D4A843; display:block; margin-bottom:20px; }
        .code  { font-family:'Bebas Neue',sans-serif; font-size:96px; letter-spacing:6px; color:#1c1c24; line-height:1; margin-bottom:4px; }
        h1     { font-family:'Bebas Neue',sans-serif; font-size:28px; letter-spacing:3px; margin-bottom:16px; }
        p      { color:#777; line-height:1.8; font-size:14px; margin-bottom:28px; }
        .divider { height:1px; background:#1c1c24; margin:28px 0; }
        a.cta {
            display:inline-block; padding:14px 36px;
            background:#D4A843; color:#000;
            font-size:11px; font-weight:700; letter-spacing:3px;
            text-transform:uppercase; text-decoration:none;
            transition:background 0.3s, transform 0.2s;
        }
        a.cta:hover { background:#e8bf6a; transform:translateY(-1px); }
    </style>
</head>
<body>
    <div class="card">
        <span class="brand">Nacho Lingua Fotografía</span>
        <div class="code">404</div>
        <h1>Página no encontrada</h1>
        <p>La página que estás buscando no existe o fue movida.</p>
        <div class="divider"></div>
        <a href="/" class="cta">
            <i class="fa-solid fa-arrow-left" style="margin-right:8px"></i>Volver al portfolio
        </a>
    </div>
</body>
</html>
