<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pago no completado — Nacho Lingua Fotografía</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
        body {
            background:#06060A; color:#f2f2f2;
            font-family:'Inter',sans-serif;
            display:flex; align-items:center; justify-content:center;
            min-height:100vh; padding:20px;
        }
        body::after {
            content:''; position:fixed; inset:0;
            background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
            opacity:0.022; pointer-events:none; z-index:0;
        }
        .card {
            max-width:480px; width:100%;
            background:#0c0c12; border:1px solid #1c1c24;
            padding:60px 44px; text-align:center;
            box-shadow:0 0 80px rgba(0,0,0,0.7);
            animation:fadeUp 0.7s ease; position:relative; z-index:1;
        }
        @keyframes fadeUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:none} }
        .icon { font-size:56px; color:#e84040; margin-bottom:24px; display:block; }
        .brand { font-family:'Bebas Neue',sans-serif; font-size:14px; letter-spacing:5px; color:#D4A843; display:block; margin-bottom:20px; }
        h1 { font-family:'Bebas Neue',sans-serif; font-size:32px; letter-spacing:3px; margin-bottom:14px; }
        p  { color:#777; line-height:1.8; font-size:14px; margin-bottom:20px; }
        .divider { height:1px; background:#1c1c24; margin:28px 0; }
        .btn-group { display:flex; gap:12px; justify-content:center; flex-wrap:wrap; }
        a {
            display:inline-block; padding:13px 28px;
            font-size:11px; font-weight:700; letter-spacing:2px;
            text-transform:uppercase; text-decoration:none; transition:0.3s;
        }
        .btn-primary { background:#D4A843; color:#000; }
        .btn-primary:hover { background:#e8bf6a; transform:translateY(-1px); }
        .btn-wa { border:1px solid rgba(37,211,102,0.4); color:#25D366; }
        .btn-wa:hover { background:rgba(37,211,102,0.08); }
    </style>
</head>
<body>
    <div class="card">
        <span class="brand">Nacho Lingua Fotografía</span>
        <i class="fa-solid fa-circle-xmark icon"></i>
        <h1>Pago no completado</h1>
        <p>El pago no pudo procesarse. Esto puede deberse a fondos insuficientes, datos incorrectos o cancelación manual.</p>
        <p>Podés intentarlo de nuevo o coordinar el pago directamente con Nacho por WhatsApp.</p>
        <div class="divider"></div>
        <div class="btn-group">
            <a href="/#portfolio" class="btn-primary">
                <i class="fa-solid fa-arrow-left"></i> Volver a la galería
            </a>
            <!-- ⚠ Reemplazá con tu número real -->
            <a href="https://wa.me/5493510000000?text=Hola%20Nacho!%20Tuve%20un%20problema%20con%20el%20pago.%20¿Me%20podés%20ayudar?"
               target="_blank" class="btn-wa">
                <i class="fa-brands fa-whatsapp"></i> WhatsApp
            </a>
        </div>
    </div>
</body>
</html>
