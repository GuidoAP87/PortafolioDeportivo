<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso Admin | Nacho Lingua</title>
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #c6a87c; --bg: #050505; }
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: var(--bg);
            color: #f0f0f0;
            font-family: 'Lato', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        /* Grain */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
            opacity: 0.03;
            pointer-events: none;
        }
        .login-box {
            text-align: center;
            padding: 56px 48px;
            border: 1px solid #1e1e1e;
            background: #0d0d0d;
            box-shadow: 0 0 60px rgba(0,0,0,0.6);
            width: 100%;
            max-width: 380px;
            animation: fadeIn 0.6s ease;
        }
        @keyframes fadeIn { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:none; } }
        .logo {
            font-family: 'Playfair Display', serif;
            font-size: 28px;
            letter-spacing: 4px;
            color: var(--gold);
            margin-bottom: 8px;
        }
        .subtitle {
            font-size: 10px;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: #555;
            margin-bottom: 40px;
        }
        h2 {
            font-family: 'Playfair Display', serif;
            font-size: 14px;
            font-weight: 400;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: #888;
            margin-bottom: 28px;
        }
        .input-group {
            position: relative;
            margin-bottom: 20px;
        }
        .input-group i {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: #444;
            font-size: 14px;
        }
        input {
            width: 100%;
            padding: 14px 14px 14px 40px;
            background: #151515;
            border: 1px solid #2a2a2a;
            color: #f0f0f0;
            font-size: 14px;
            font-family: 'Lato', sans-serif;
            outline: none;
            transition: border-color 0.3s;
            letter-spacing: 2px;
        }
        input:focus { border-color: var(--gold); }
        button {
            width: 100%;
            padding: 15px;
            background: var(--gold);
            border: none;
            color: #000;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 3px;
            text-transform: uppercase;
            cursor: pointer;
            transition: background 0.3s, transform 0.2s;
            font-family: 'Lato', sans-serif;
        }
        button:hover { background: #dfc08e; transform: translateY(-1px); }
        button:active { transform: translateY(0); }
        button:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
        .error {
            color: #e05252;
            font-size: 12px;
            margin-top: 16px;
            display: none;
            animation: shake 0.3s ease;
        }
        @keyframes shake {
            0%,100% { transform: translateX(0); }
            25%      { transform: translateX(-6px); }
            75%      { transform: translateX(6px); }
        }
        .back-link {
            display: block;
            margin-top: 28px;
            font-size: 11px;
            letter-spacing: 2px;
            color: #444;
            text-decoration: none;
            text-transform: uppercase;
            transition: color 0.3s;
        }
        .back-link:hover { color: var(--gold); }

        /* Font Awesome mini (solo iconos lock) */
        @import url("https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css");
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
    <div class="login-box">
        <div class="logo">NL</div>
        <p class="subtitle">Nacho Lingua Fotografía</p>
        <h2>Acceso restringido</h2>

        <div class="input-group">
            <i class="fa-solid fa-lock"></i>
            <input type="password" id="password" placeholder="Contraseña"
                   onkeydown="if(event.key==='Enter') intentarLogin()">
        </div>

        <button id="login-btn" onclick="intentarLogin()">Ingresar</button>
        <p id="error-msg" class="error">
            <i class="fa-solid fa-triangle-exclamation"></i> Contraseña incorrecta
        </p>

        <a href="index.html" class="back-link">
            <i class="fa-solid fa-arrow-left" style="margin-right:6px;"></i>Volver al portfolio
        </a>
    </div>

    <script>
        async function intentarLogin() {
            const pass = document.getElementById('password').value;
            const btn  = document.getElementById('login-btn');
            const err  = document.getElementById('error-msg');
            if (!pass) return;

            btn.disabled    = true;
            btn.textContent = 'Verificando...';
            err.style.display = 'none';

            try {
                const res  = await fetch('/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password: pass }),
                    credentials: 'include'
                });
                const data = await res.json();
                if (data.success) {
                    btn.textContent = '✓ Acceso concedido';
                    setTimeout(() => { window.location.href = 'index.html'; }, 600);
                } else {
                    err.style.display   = 'block';
                    btn.disabled        = false;
                    btn.textContent     = 'Ingresar';
                    document.getElementById('password').value = '';
                    document.getElementById('password').focus();
                }
            } catch {
                err.textContent   = 'Error de conexión. Intentá de nuevo.';
                err.style.display = 'block';
                btn.disabled      = false;
                btn.textContent   = 'Ingresar';
            }
        }
    </script>
</body>
</html>
